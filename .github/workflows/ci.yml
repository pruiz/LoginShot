name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List project schemes
        run: xcodebuild -list -project LoginShot.xcodeproj

      - name: Build
        run: xcodebuild -scheme LoginShot -configuration Debug -destination 'platform=macOS' build

      - name: Test
        run: xcodebuild -scheme LoginShot -destination 'platform=macOS' test
