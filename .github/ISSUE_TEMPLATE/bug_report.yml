name: Bug report
description: Report a defect or regression
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please provide enough detail to reproduce.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps and configuration when possible.
      placeholder: |
        1. Configure ...
        2. Start LoginShot ...
        3. Trigger unlock/lock/manual capture ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LoginShot version/build
      placeholder: 0.1.0 (build 1)
  - type: input
    id: os
    attributes:
      label: macOS version/build
      placeholder: macOS 14.7 (23H124)
  - type: dropdown
    id: trigger
    attributes:
      label: Trigger type
      options:
        - session-open
        - unlock
        - lock
        - manual
        - unknown
  - type: textarea
    id: config
    attributes:
      label: Relevant config snippet
      description: Paste the relevant part of config.yml (redact sensitive paths/usernames if needed).
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: |
        Paste relevant logs and screenshots.
        Unified log example:
        log show --last 10m --predicate 'subsystem == "dev.pruiz.LoginShot"'
        Optional file logs (if enabled): ~/Library/Logs/LoginShot/
